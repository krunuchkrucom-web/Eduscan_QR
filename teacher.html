<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - EduTrack QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex">
        <nav id="teacher-sidebar" class="bg-white p-3 shadow-sm border-end" style="width: 260px; min-height: 100vh;">
            <h6 class="fw-bold text-primary mb-4 border-bottom pb-3">EduTrack QR (ครู)</h6>
            <ul class="nav nav-pills flex-column">
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link active" id="menu-dash" onclick="showDashboard()">🏠 จัดการชั้นเรียน</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-dark" id="menu-qr" onclick="showCreateQR()">🖼️ สร้าง QR Code</a>
                </li>
                <li class="nav-item mt-4">
                    <a href="#" class="nav-link text-danger" onclick="logout()">🚪 ออกจากระบบ</a>
                </li>
            </ul>
        </nav>

        <main class="flex-grow-1 bg-light">
            <header class="navbar bg-white p-3 shadow-sm mb-4">
                <span class="fw-bold px-3" id="header-title">ระบบจัดการชั้นเรียน</span>
                <div class="ms-auto px-3 text-end" id="user-display-area">
                    </div>
            </header>

            <div class="p-4" id="content-area">
                </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="teacher.js"></script>
</body>
</html>
