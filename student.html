<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - EduTrack QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-header { background: linear-gradient(135deg, #60a5fa, #2563eb); color: white; border-radius: 20px; }
        .stat-box { border-radius: 15px; border: none; background: white; transition: 0.3s; }
        .stat-box:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">
                <img src="https://cdn-icons-png.flaticon.com/512/2997/2997313.png" width="30" class="me-2">
                EduTrack QR
            </a>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill">ออกจากระบบ</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-header p-4 mb-4 shadow-sm">
            <div class="d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/3429/3429433.png" width="70" class="bg-white rounded-circle p-2 me-3">
                <div>
                    <h4 class="mb-0 fw-bold" id="st-name">กำลังโหลด...</h4>
                    <p class="mb-0 opacity-75" id="st-id">รหัสนักเรียน: -</p>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4 text-center">
            <div class="col-6 col-md-3">
                <div class="stat-box p-3 shadow-sm">
                    <h6 class="text-muted small">มาเรียน</h6>
                    <h3 class="fw-bold text-success" id="count-present">0</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-box p-3 shadow-sm">
                    <h6 class="text-muted small">สาย</h6>
                    <h3 class="fw-bold text-warning" id="count-late">0</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-box p-3 shadow-sm">
                    <h6 class="text-muted small">ขาด</h6>
                    <h3 class="fw-bold text-danger" id="count-absent">0</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-box p-3 shadow-sm">
                    <h6 class="text-muted small">ลา</h6>
                    <h3 class="fw-bold text-info" id="count-leave">0</h3>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h5 class="fw-bold mb-3">ประวัติการเข้าเรียนล่าสุด</h5>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>วันที่</th>
                            <th>วิชา</th>
                            <th>เวลาที่บันทึก</th>
                            <th>สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="st-history-list">
                        <tr><td colspan="4" class="text-center">กำลังดึงข้อมูลประวัติ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="student.js"></script>
</body>
</html>
