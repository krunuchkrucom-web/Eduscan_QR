<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้าง QR Code - EduTrack QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: white; padding: 20px; border-right: 1px solid #eee; }
        .brand-title { color: #0d6efd; font-weight: bold; font-size: 24px; margin-bottom: 5px; }
        .nav-link { color: #444; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; text-decoration: none; display: block; }
        .nav-link:hover { background: #f0f4ff; color: #0d6efd; }
        .nav-link.active { background: #0d6efd; color: white !important; }
        .logout-link { color: #dc3545; margin-top: 50px; display: block; text-decoration: none; padding: 12px 15px; }
        .qr-placeholder { width: 200px; height: 200px; border: 2px dashed #ddd; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        #canvasQR img { margin: 0 auto; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <div class="brand-title">EduTrack QR</div>
            <nav class="nav flex-column mt-4">
                <a class="nav-link" href="teacher.html"><i class="fas fa-users"></i> จัดการนักเรียน</a>
                <a class="nav-link active" href="qrcode.html"><i class="fas fa-qrcode"></i> สร้าง QR Code</a>
                <a class="nav-link" href="scanner.html"><i class="fas fa-camera"></i> สแกนเข้าเรียน</a>
                <a class="nav-link" href="reports.html"><i class="fas fa-chart-pie"></i> สรุปผลการเรียน</a>
                <a href="#" class="logout-link" onclick="logout()"><i class="fas fa-power-off"></i> ออกจากระบบ</a>
            </nav>
        </div>

        <div class="col-md-10 p-4">
            <h5 class="mb-4 text-primary fw-bold"><i class="fas fa-qrcode me-2"></i>ระบบสร้าง QR Code รายบุคคล</h5>
            
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                <h6 class="mb-3 text-secondary">1. เลือกห้องเรียน</h6>
                <div id="roomContainer" class="d-flex flex-wrap"></div>
            </div>

            <div class="row">
                <div class="col-md-7">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                        <h6 class="mb-3 text-secondary">2. เลือกนักเรียน (ห้อง: <span id="currentRoomText" class="fw-bold text-primary">กรุณาเลือกห้อง</span>)</h6>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>รหัส</th>
                                        <th>ชื่อ-นามสกุล</th>
                                        <th class="text-end">เลือก</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody">
                                    <tr><td colspan="3" class="text-center py-5">กรุณาเลือกห้องเรียน</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-md-5 text-center">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                        <h6 class="mb-4 text-start text-secondary">3. QR Code ของคุณ</h6>
                        <div class="d-flex justify-content-center mb-3">
                            <div id="qrPlaceholder" class="qr-placeholder">
                                <i class="fas fa-qrcode fa-4x text-muted opacity-25"></i>
                            </div>
                            <div id="canvasQR"></div>
                        </div>
                        <h5 id="qrName" class="fw-bold mt-2">-</h5>
                        <p id="qrId" class="text-muted">-</p>
                        <button class="btn btn-success w-100 rounded-pill mt-3 py-2" id="btnDl" onclick="downloadQR()" disabled>
                            <i class="fas fa-download me-2"></i> ดาวน์โหลดภาพ QR Code
                        </button>
                    </div>
                    <div class="col-md-5 text-center">
    <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h6 class="mb-0 text-secondary text-start">3. QR Code ของคุณ</h6>
            <button class="btn btn-outline-dark btn-sm rounded-pill" id="btnPrintAll" onclick="printAllRoom()" disabled>
                <i class="fas fa-print me-1"></i> ปริ้นทั้งห้อง
            </button>
        </div>
        
        <div class="d-flex justify-content-center mb-3">
            <div id="qrPlaceholder" class="qr-placeholder">
                <i class="fas fa-qrcode fa-4x text-muted opacity-25"></i>
            </div>
            <div id="canvasQR"></div>
        </div>
        <h5 id="qrName" class="fw-bold mt-2">-</h5>
        <p id="qrId" class="text-muted">-</p>
        
        <div class="row g-2 mt-2">
            <div class="col-6">
                <button class="btn btn-success w-100 rounded-pill py-2" id="btnDl" onclick="downloadQR()" disabled>
                    <i class="fas fa-download me-1"></i> ดาวน์โหลด
                </button>
            </div>
            <div class="col-6">
                <button class="btn btn-dark w-100 rounded-pill py-2" id="btnPrintSingle" onclick="printSingleQR()" disabled>
                    <i class="fas fa-print me-1"></i> ปริ้นใบนี้
                </button>
            </div>
        </div>
    </div>
</div>

<div id="printSection" style="display: none;"></div>

<style>
    /* สไตล์สำหรับการปริ้น */
    @media print {
        body * { visibility: hidden; }
        #printSection, #printSection * { visibility: visible; }
        #printSection {
            position: absolute;
            left: 0; top: 0; width: 100%;
            display: block !important;
        }
    }
</style>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="QRCode.js"></script> </body>
</html>
