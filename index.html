<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack QR - Classroom Pro Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* สไตล์เพิ่มเติมเพื่อความสวยงามของหน้าเมนูย่อย */
        .sub-page { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-menu { cursor: pointer; transition: 0.3s; border: none; border-radius: 15px; }
        .card-menu:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="loader" class="loader-overlay" style="display:none;">
        <div class="spinner-border text-light" role="status"></div>
    </div>

    <div id="app">
        <div id="role-view" class="container d-flex align-items-center justify-content-center min-vh-100">
            <div class="text-center">
                <div class="mb-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/2997/2997313.png" width="100" class="mb-3">
                    <h1 class="fw-bold">EduTrack <span class="text-primary italic">QR</span></h1>
                    <p class="text-muted">ระบบจัดการห้องเรียนและเช็คชื่ออัจฉริยะ</p>
                </div>
                <div class="row g-4 justify-content-center">
                    <div class="col-11 col-sm-5">
                        <div class="role-card shadow-sm p-4 bg-white rounded-4 border-0 h-100" onclick="selectRole('Student')">
                            <div class="icon-box bg-info-light mb-3 mx-auto">
                                <img src="https://cdn-icons-png.flaticon.com/512/3429/3429433.png" width="60">
                            </div>
                            <h4 class="fw-bold text-dark">สำหรับนักเรียน</h4>
                            <p class="small text-muted mb-0">ดูสถิติมาเรียน & ส่งงาน</p>
                        </div>
                    </div>
                    <div class="col-11 col-sm-5">
                        <div class="role-card shadow-sm p-4 bg-white rounded-4 border-0 h-100" onclick="selectRole('Teacher')">
                            <div class="icon-box bg-warning-light mb-3 mx-auto">
                                <img src="https://cdn-icons-png.flaticon.com/512/906/906175.png" width="60">
                            </div>
                            <h4 class="fw-bold text-dark">สำหรับผู้สอน</h4>
                            <p class="small text-muted mb-0">จัดการข้อมูล & ตั้งค่าระบบ</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="login-view" class="container mt-5" style="display:none;">
            <div class="text-center mb-4">
                 <button class="btn btn-sm btn-outline-secondary rounded-pill mb-3" onclick="backToRole()">← เปลี่ยนสถานะ</button>
                 <h2 id="login-title" class="fw-bold text-primary">เข้าสู่ระบบ</h2>
                 <p id="role-badge" class="badge rounded-pill shadow-sm px-3 py-2"></p>
            </div>
            <div class="login-card mx-auto shadow-lg p-5 rounded-5 bg-white" style="max-width: 400px;">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" id="username" class="form-control rounded-pill border-0 bg-light px-3" placeholder="กรอกชื่อผู้ใช้">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" id="password" class="form-control rounded-pill border-0 bg-light px-3" placeholder="กรอกรหัสผ่าน">
                </div>
                <button onclick="handleLogin()" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow">เข้าสู่ระบบ</button>
            </div>
        </div>
        
<div id="main-view" style="display:none; overflow-x: hidden;">
            <div class="teacher-container d-flex">
                <nav id="teacher-sidebar" class="bg-white p-3 shadow-sm border-end d-flex flex-column" style="min-width: 250px; min-height: 100vh;">
                    <div class="logo-area d-flex align-items-center mb-4 pb-2 border-bottom">
                        <img src="https://cdn-icons-png.flaticon.com/512/2997/2997313.png" width="40" class="me-2">
                        <h4 class="fw-bold text-primary mb-0">EduTrack QR</h4>
                    </div>
                    
                    <ul class="nav nav-pills flex-column extra-small mb-auto">
                        <li class="nav-item mb-2">
                            <a href="#" class="nav-link active rounded-pill d-flex align-items-center" onclick="showDashboard(this)">
                                <i class="me-2 text-primary fs-5">🏠</i> <span>จัดการชั้นเรียน</span>
                            </div>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="#" class="nav-link text-muted rounded-pill d-flex align-items-center" onclick="showCreateQR(this)">
                                <i class="me-2 fs-5">🖼️</i> <span>สร้าง QR Code</span>
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="#" class="nav-link text-muted rounded-pill d-flex align-items-center" onclick="showHistory(this)">
                                <i class="me-2 fs-5">📅</i> <span>สรุปมาเรียน</span>
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a href="#" class="nav-link text-muted rounded-pill d-flex align-items-center" onclick="showTeacherSetting(this)">
                                <i class="me-2 fs-5">⚙️</i> <span>ตั้งค่า</span>
                            </a>
                        </li>
                    </ul>

                    <div class="sidebar-footer border-top pt-3 text-center mt-3">
                        <button onclick="logout()" class="btn btn-danger btn-sm rounded-pill w-100 fw-bold shadow-sm extra-small">
                            ออกจากระบบ
                        </button>
                    </div>
                </nav>

                <main id="teacher-content" class="bg-light w-100">
                    <header class="navbar navbar-expand bg-white p-3 shadow-sm border-bottom sticky-top">
                        <div class="container-fluid p-0">
                            <button id="sidebarToggle" class="btn btn-sm btn-outline-secondary me-3 rounded-circle" onclick="toggleSidebar()">
                                ☰
                            </button>
                            <span class="navbar-brand fw-bold text-primary italic ms-2">จัดการชั้นเรียน</span>
                            
                            <div class="ms-auto d-flex align-items-center">
                                <div id="user-display-name" class="me-3 small fw-bold text-dark text-end">
                                    <span class="d-block">ยินดีต้อนรับ</span>
                                    <span class="text-muted extra-small">คุณครู admin</span>
                                </div>
                                <img id="teacher-avatar" src="https://cdn-icons-png.flaticon.com/512/921/921105.png" class="rounded-circle border" width="40" height="40" alt="Avatar">
                            </div>
                        </div>
                    </header>

                    <div id="content-area" class="container-fluid p-4">
                        </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
